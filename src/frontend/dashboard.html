<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container">
    <h2>Dashboard</h2>
    <p id="welcome"></p>
    <pre id="userData"></pre>
    <button id="logoutBtn">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    document.getElementById("welcome").textContent = `Welcome, ${localStorage.getItem("userName") || "User"}`;

    async function loadUser() {
      const response = await fetch("http://localhost/Life-Discovery-Backend/api/auth/me.php", {
        method: "GET",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const data = await response.json();

      if (!data.success) {
        localStorage.removeItem("token");
        localStorage.removeItem("userName");
        window.location.href = "login.html";
        return;
      }

      document.getElementById("userData").textContent = JSON.stringify(data.user, null, 2);
    }

    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
      window.location.href = "login.html";
    });

    loadUser();
  </script>
</body>
</html>
